version: 1.3.12
cache: true

endpoints:
  azureOpenAI:
    groups:
      - group: "azure-gpt"
        apiKey: "${AZURE_API_KEY}"
        instanceName: "henryli06-0342-resource"
        version: "2024-08-01-preview"
        models:
          gpt-4o:
            deploymentName: "gpt-5.5"

modelSpecs:
  list:
    - name: "display-gpt-5.5"
      label: "GPT-5.5"
      description: "Azure OpenAI"
      iconURL: "azureOpenAI"
      preset:
        endpoint: "azureOpenAI"
        model: "gpt-4o"

    - name: "display-claude-opus"
      label: "Claude Opus 4.8"
      description: "Azure Anthropic"
      iconURL: "anthropic"
      preset:
        endpoint: "anthropic"
        model: "claude-opus-4-8"
